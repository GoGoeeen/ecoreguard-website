[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/impressum"
  to = "/imprint.html"
  status = 301

[[redirects]]
  from = "/datenschutz"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/certify"
  to = "/certify.html"
  status = 301

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  publish = "."